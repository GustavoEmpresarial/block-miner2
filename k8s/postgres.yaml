apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockminer-db
  labels:
    app: blockminer-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blockminer-db
  template:
    metadata:
      labels:
        app: blockminer-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "blockminer"
            - name: POSTGRES_PASSWORD
              value: "blockminer_password" # Tip: Use K8s Secrets for production passwords
            - name: POSTGRES_DB
              value: "blockminer_db"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: blockminer-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: blockminer-db-service
spec:
  selector:
    app: blockminer-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blockminer-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
