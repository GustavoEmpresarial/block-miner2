services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: blockminer
      POSTGRES_PASSWORD: blockminer_password
      POSTGRES_DB: blockminer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        VITE_TELEGRAM_SUPPORT_URL: ${VITE_TELEGRAM_SUPPORT_URL:-https://t.me/+KPgyUFtKCZ00Y2Vh}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      # Só 1 em emergência se db push falhar e precisar de inspecionar logs (login pode estar partido).
      ALLOW_START_WITHOUT_DB_PUSH: ${ALLOW_START_WITHOUT_DB_PUSH:-0}
      # Override the DATABASE_URL to point to the docker-compose 'db' service
      DATABASE_URL: "postgresql://blockminer:blockminer_password@db:5432/blockminer_db?schema=public"
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: 7
      BACKUP_INTERVAL_HOURS: 24
      # Backup (valores vêm do .env na raiz; ver também config/env.backup.vps.example)
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      BACKUP_CRON: "${BACKUP_CRON:-0 3 * * *}"
      BACKUP_RUN_ON_STARTUP: ${BACKUP_RUN_ON_STARTUP:-false}
      BACKUP_STARTUP_DELAY_MS: ${BACKUP_STARTUP_DELAY_MS:-60000}
      BACKUP_FILENAME_PREFIX: ${BACKUP_FILENAME_PREFIX:-blockminer-db-}
      BACKUP_PG_GZIP: ${BACKUP_PG_GZIP:-true}
      BACKUP_EXTERNAL_ENABLED: ${BACKUP_EXTERNAL_ENABLED:-false}
      BACKUP_EXTERNAL_DIR: ${BACKUP_EXTERNAL_DIR:-}
      BACKUP_EXTERNAL_RETENTION_DAYS: ${BACKUP_EXTERNAL_RETENTION_DAYS:-30}
      BACKUP_CLOUD_ENABLED: ${BACKUP_CLOUD_ENABLED:-false}
      # Comando completo (recomendado) ou só REMOTE + FOLDER_ID (backup.js monta o rclone copy)
      BACKUP_CLOUD_COMMAND: ${BACKUP_CLOUD_COMMAND:-}
      BACKUP_CLOUD_REMOTE: ${BACKUP_CLOUD_REMOTE:-gdrive}
      BACKUP_CLOUD_FOLDER_ID: ${BACKUP_CLOUD_FOLDER_ID:-}
      BACKUP_CLOUD_TIMEOUT_MS: ${BACKUP_CLOUD_TIMEOUT_MS:-120000}
      BACKUP_FULL_SITE_ON_STARTUP: ${BACKUP_FULL_SITE_ON_STARTUP:-false}
      BACKUP_FULL_SITE_STARTUP_DELAY_MS: ${BACKUP_FULL_SITE_STARTUP_DELAY_MS:-15000}
      # Check-in: valor padrão 0,01 POL se .env não definir (receiver usa CHECKIN_RECEIVER ou DEPOSIT_WALLET_ADDRESS no código)
      CHECKIN_AMOUNT_WEI: ${CHECKIN_AMOUNT_WEI:-10000000000000000}
      # Redefinição de senha: sobrepõe PASSWORD_RESET_TOKEN_TTL do .env (evita e-mail a dizer 20m por configs antigas).
      PASSWORD_RESET_TOKEN_TTL: "24h"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./uploads:/app/uploads
      # rw: o Google OAuth do rclone precisa de gravar token renovado em rclone.conf
      - /root/.config/rclone:/root/.config/rclone
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:

